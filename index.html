<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disconnecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-105vh) rotate(360deg); opacity: 0; }
        }
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(300%); }
        }
        .animate-scan { animation: scan 8s linear infinite; }
        .heart { animation: floatUp linear forwards; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.3); border-radius: 4px; }
    </style>
</head>
<body class="relative min-h-screen bg-slate-950 text-emerald-400 font-mono flex flex-col items-center justify-center overflow-hidden p-4 md:p-6 select-none">

    <audio id="bg-music" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="absolute inset-0 bg-[linear-gradient(to_right,#0f172a_1px,transparent_1px),linear-gradient(to_bottom,#0f172a_1px,transparent_1px)] bg-[size:4rem_4rem] opacity-40"></div>
    <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-emerald-500/5 to-transparent h-1/3 w-full animate-scan"></div>

    <div id="hearts-container" class="absolute inset-0 pointer-events-none"></div>

    <div class="relative z-10 max-w-2xl w-full bg-slate-900/80 border border-emerald-500/30 rounded-lg p-6 backdrop-blur-md shadow-[0_0_30px_rgba(16,185,129,0.1)]">
        <div class="flex items-center justify-between border-b border-slate-800 pb-3 mb-4">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                <div class="w-3 h-3 rounded-full bg-emerald-500/80"></div>
                <span class="text-xs text-slate-500 ml-2">session_termination.log</span>
            </div>
            <span class="text-[10px] bg-red-950/40 border border-red-500/30 text-red-400 px-2 py-0.5 rounded animate-pulse">🔴 DISCONNECTED</span>
        </div>

        <div id="terminal-body" class="leading-relaxed text-sm md:text-base min-h-[280px] text-slate-300 overflow-y-auto max-h-[70vh] pr-2 font-sans">
            <span class="text-emerald-500 font-mono font-bold">$ run goodbye_protocol.sh</span> <br />
            <span class="text-slate-500 font-mono" id="timestamp"></span> <br /><br />
            <span id="typing-text" class="whitespace-pre-line"></span><span class="animate-pulse font-bold text-emerald-400">|</span>
        </div>
    </div>

    <div class="absolute bottom-4 left-4 text-[10px] text-slate-600">
        SECURE_CONNECTION_CLOSED // AUTH_REVOKED
    </div>

    <script>
        // Brauzer blokirovkasini chetlab o'tish uchun istalgan joy bosilganda musiqa chalinishi kafolatlanadi
        window.addEventListener('click', () => {
            const bgMusic = document.getElementById('bg-music');
            if (bgMusic.paused) {
                bgMusic.volume = 0.5;
                bgMusic.play().catch(e => console.log("Musiqa xatosi:", e));
            }
        });

        // Vaqtni o'rnatish
        document.getElementById('timestamp').innerText = "[" + new Date().toLocaleTimeString() + "] Status: Terminating session successfully...";

        // Skrinshottagi to'liq matn (Ssenariy bo'yicha)
        const fullText = "Siz bilan gaplashib, bir-birimizni tushunishga harakat qilib ko‘rdik, lekin fe’l-atvorimiz va dunyoqarashimiz umuman mos kelmasligini bildim. Hozirdan o‘rtamizda shunchalik tushunmovchilik va og‘ir urushlar bo‘layotgan ekan, keyinchalik birga hayot qurganimizda ham tinchlik bo‘lishiga hech kim kafolat berolmaydi. Men kelajakda bunday asabbuzar ko‘ngilsizliklar bilan yashashni xohlamayman.\n\nOxirgi bo‘lgan gap-so‘zlardan keyin o‘rtamizda hech qanday iliqlik qolmadi, qaytib yarasha olmayman. Sovchi jo‘natish niyatimdan ham butunlay qaytdim.\n\nSizdan iltimos, mendan keyin umidvor bo‘lib meni kutmang. Bir-birimizni ortiqcha bezovta qilmaylik va vaqtimizni ketkazmaylik. Yo‘limiz ham, taqdirimiz ham mutlaqo boshqa. Hayotda o‘zingizga mos, sizni tushunadigan insonni topishingizni tilayman.\n\nmendan zarracha umidvor bo‘lmang, yo‘limni kutmang. Meni qaytarishga yoki tushuntirishga urinib o‘zingizni ham, meni ham bezovta qilmang.\n\nBiz uchun eng yaxshisi — bir-birimizga begona bo‘lib qolish.\n\nSizga tilagim: doimo ota-onangizning aytganini qilib, gaplariga quloq soling, ularning yuzini yorug‘ qiladigan soliha qiz bo‘ling. Hayotda to‘xtab qolmay, shaxsiy rivojlanishingiz, o‘qish va maqsadlaringiz ustida ishlang. Va eng muhimi — har qanday vaziyatda ham qalbingizdagi iymoningizni yo‘qotmang. Doimo o‘zingizni ehtiyot qiling.\n\nBiz uchun eng yaxshisi — bir-birimizga begona bo‘lib qolish. Taqdiringiz mendan xayrli va go‘zal bo‘lsin..............!!!";

        let index = 0;
        const typingText = document.getElementById('typing-text');
        const terminalBody = document.getElementById('terminal-body');

        function type() {
            if (index < fullText.length) {
                typingText.innerHTML += fullText.charAt(index);
                index++;
                terminalBody.scrollTop = terminalBody.scrollHeight;
                setTimeout(type, 40); // Matn yozilish tezligi silliq va mayin
            }
        }
        
        // Sahifa ochilgach 1.5 sekund kutiladi, musiqa boshlanib matn yozila boshlaydi
        setTimeout(() => {
            const bgMusic = document.getElementById('bg-music');
            bgMusic.volume = 0.5;
            bgMusic.play().catch(e => console.log("Autoplay cheklandi, ekranga bosish kutilmoqda"));
            type();
        }, 1500);

        // Fondagi kiber-romantik yuraklar generatori
        const container = document.getElementById('hearts-container');
        setInterval(() => {
            const heart = document.createElement('span');
            heart.className = 'absolute bottom-[-20px] text-red-500 opacity-50 heart';
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + '%';
            
            const size = Math.random() * 18 + 10;
            heart.style.fontSize = size + 'px';
            
            const duration = Math.random() * 4 + 4;
            heart.style.animationDuration = duration + 's';
            heart.style.textShadow = '0 0 10px rgba(239, 68, 68, 0.5)';
            
            container.appendChild(heart);
            setTimeout(() => heart.remove(), duration * 1000);
        }, 600);
    </script>
</body>
</html>
